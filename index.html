<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Org. Viagem">

  <title>Organizador Financeiro de Viagem</title>

  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>

    :root{
      --primary:#2563EB;
      --background:#F8FAFC;
      --text:#0F172A;
      --border:#E2E8F0;
    }

    body{
      margin:0;
      padding:0;
      font-family:'Poppins', sans-serif;
      background:var(--background);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    #app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      background:#fff;
      position:relative;
    }

    .screen{
      display:none;
      min-height:100vh;
      padding:24px;
      animation:fade .3s ease;
    }

    .screen.active{ display:block; }

    input, textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      margin-top:8px;
      font-size:14px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:14px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-secondary{ background:#E2E8F0; color:#0F172A; }
    .hidden{ display:none !important; }

    .progress-bar{
      width:100%;
      height:10px;
      background:#E2E8F0;
      border-radius:50px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      background:var(--primary);
      width:0%;
      transition:width .4s ease;
    }

    .dashboard, .home, .wizard, .result{ max-width:430px; margin:0 auto; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      box-shadow:0 6px 18px rgba(15,23,42,0.05);
    }

    .hero{ margin-bottom:20px; }
    .hero h2{ font-size:22px; margin-bottom:6px; }
    .hero p{ color:#64748B; }

    .wizard-header{ margin-bottom:20px; }
    .wizard-actions{ display:flex; gap:10px; }

    .result{ text-align:center; }

    .goal-box{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      margin-top:16px;
    }

    .goal-box table{ width:100%; }
    .goal-box td{ padding:10px 0; font-size:14px; }

    .upsell{
      background:#0F172A;
      color:#fff;
      padding:18px;
      border-radius:16px;
    }

    .splash-container{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
